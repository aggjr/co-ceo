<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Apollo Global Command | v13.5 High-Vis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="global_network_data.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-surface: #1e293b;
            --bg-sidebar: #01050d;
            --border-ui: #334155;
            --disponivel: #3b82f6; 
            --fisico: #cbd5e1;     /* Cinza mais claro para maior visibilidade */
            --critico: #ef4444;
            --abaixo: #fbbf24;
            --mira: #10b981;
            --muito-acima: #3b82f6;
            --text-main: #f1f5f9;
        }

        * { box-sizing: border-box; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Outfit', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; }

        #sidebar {
            width: 210px; background: var(--bg-sidebar); border-right: 1px solid var(--border-ui);
            display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0;
        }
        .sidebar-logo { padding: 0 20px 20px; font-weight: 600; font-size: 16px; color: var(--disponivel); letter-spacing: 1px; text-transform: uppercase; }
        .sidebar-label { padding: 15px 20px 5px; font-size: 10px; text-transform: uppercase; color: rgba(255,255,255,0.2); letter-spacing: 1px; }
        .menu-item {
            padding: 12px 20px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.4);
            transition: all 0.2s; border-left: 3px solid transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .menu-item.active { background: rgba(59, 130, 246, 0.08); color: var(--disponivel); font-weight: 600; border-left-color: var(--disponivel); }

        #content-area { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; }
        .header { flex: 0 0 auto; text-align: center; border-bottom: 2px solid var(--border-ui); padding-bottom: 8px; margin-bottom: 12px; }
        .header h1 { font-size: 18px; font-weight: 600; margin: 0; color: #fff; text-transform: uppercase; }
        
        .chart-container { flex: 1 1 auto; min-height: 0; background: var(--bg-surface); padding: 12px; border-radius: 12px; border: 1px solid var(--border-ui); margin-bottom: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .footer-grid { flex: 0 0 auto; display: grid; grid-template-columns: repeat(4, 310px); gap: 12px; width: 100%; justify-content: center; }
        .info-card { background: var(--bg-surface); padding: 10px; border-radius: 10px; border: 1px solid var(--border-ui); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 85px; }
        
        .equation-mini { display: flex; align-items: baseline; justify-content: center; gap: 6px; width: 100%; }
        .eq-mini-val { font-size: 20px; font-weight: 900; }
        .eq-mini-sign { font-size: 14px; color: var(--fisico); font-weight: 400; }
        .health-tag { font-size: 10px; font-weight: 900; padding: 2px 5px; border-radius: 4px; margin-left: 4px; }
        
        .card-value { font-size: 20px; font-weight: 900; margin-bottom: 2px; }
        .card-label { font-size: 8px; color: var(--fisico); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        
        .legend-strip { flex: 0 0 auto; display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; font-size: 9px; text-transform: uppercase; }
        .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.03); }
        .legend-item.hidden { opacity: 0.15; text-decoration: line-through; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .line { width: 22px; height: 2px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-logo">Apollo Global</div>
        <div class="sidebar-label">Rede</div>
        <div class="menu-item" onclick="switchStore('Fábrica')">Fábrica (CD)</div>
        <div class="sidebar-label">Unidades</div>
        <div id="list-stores"></div>
    </div>

    <div id="content-area">
        <div class="header"><h1 id="title-main">3097 | <span id="store-tag" style="color:var(--disponivel)">-</span></h1></div>
        
        <div class="chart-container"><canvas id="apolloChart"></canvas></div>

        <div class="legend-strip">
            <div class="legend-item" onclick="toggleDataset(0, this)"><div class="line" style="background: var(--disponivel); box-shadow: 0 0 8px var(--disponivel);"></div> DISPONÍVEL</div>
            <div class="legend-item" onclick="toggleDataset(1, this)"><div class="line" style="border-top: 3px dotted var(--fisico); height:0; width:25px;"></div> FÍSICO (ROI)</div>
            <div class="legend-item" onclick="toggleDataset(2, this)"><div class="dot" style="background: #000; border: 1px solid #fff;"></div> RUPTURA</div>
            <div class="legend-item" onclick="toggleDataset(3, this)"><div class="dot" style="background: var(--critico);"></div> 🔴 50%</div>
            <div class="legend-item" onclick="toggleDataset(4, this)"><div class="dot" style="background: var(--abaixo);"></div> 🟡 100%</div>
            <div class="legend-item" onclick="toggleDataset(5, this)"><div class="dot" style="background: var(--mira);"></div> 🟢 150%</div>
            <div class="legend-item" onclick="toggleDataset(6, this)"><div class="dot" style="background: var(--muito-acima);"></div> 🔵 200%</div>
        </div>

        <div class="footer-grid">
            <div class="info-card">
                <div class="equation-mini">
                    <div class="eq-mini-val" id="val-fisico" style="color: #fff;">--</div>
                    <div class="eq-mini-sign">-</div>
                    <div class="eq-mini-val" id="val-vitrine" style="color: rgba(255,255,255,0.5);">--</div>
                    <div class="eq-mini-sign">=</div>
                    <div class="eq-mini-val" id="val-disponivel" style="color: var(--disponivel);">--</div>
                    <span id="health-pct" class="health-tag">--%</span>
                </div>
                <div class="card-label">FÍSICO - VITRINE = DISP.</div>
            </div>
            <div class="info-card" id="status-card" style="border-width: 2px;">
                <div class="card-value" id="val-status">--</div>
                <div class="card-label">STATUS OPERACIONAL</div>
            </div>
            <div class="info-card">
                <div class="card-value" id="val-ruptura" style="color: var(--critico);">--%</div>
                <div class="card-label">RUPTURA (TEMPO ABAIXO P10)</div>
            </div>
            <div class="info-card">
                <div class="card-value" id="val-lost" style="color: var(--critico);">-- un</div>
                <div class="card-label">Vendas Perdidas (Qtde)</div>
            </div>
        </div>
    </div>

<script>
    let mainChart;
    const statusColors = { "CRÍTICO": "#ef4444", "ABAIXO": "#fbbf24", "ACIMA": "#10b981", "NA MIRA": "#3b82f6", "MUITA SOBRA": "#8b5cf6" };

    function formatDate(dateStr) { const [y, m, d] = dateStr.split('-'); return `${d}/${m}/${y}`; }
    
    function toggleDataset(idx, el) { 
        const v = mainChart.isDatasetVisible(idx); 
        mainChart.setDatasetVisibility(idx, !v); 
        mainChart.update(); 
        el.classList.toggle('hidden', v); 
    }

    function switchStore(name) {
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        const data = APOLLO_NETWORK_DATA[name];
        if(!data) return;
        document.getElementById('store-tag').innerText = name.toUpperCase();
        
        const m = data.metrics;
        document.getElementById('val-fisico').innerText = m.currentPhysical;
        document.getElementById('val-vitrine').innerText = m.vitrine;
        document.getElementById('val-disponivel').innerText = m.currentAvailable;
        document.getElementById('health-pct').innerText = m.stockHealth.toFixed(0) + '%';
        document.getElementById('health-pct').style.backgroundColor = statusColors[m.currentStatus] + '33';
        document.getElementById('health-pct').style.color = statusColors[m.currentStatus];
        document.getElementById('val-status').innerText = m.currentStatus;
        document.getElementById('val-status').style.color = statusColors[m.currentStatus];
        document.getElementById('status-card').style.borderColor = statusColors[m.currentStatus];
        document.getElementById('val-ruptura').innerText = m.ruptureRate.toFixed(1) + '%';
        document.getElementById('val-lost').innerText = Math.ceil(m.lostUnits) + ' un';
        
        render(data.timeline);
    }

    function render(timeline) {
        const ctx = document.getElementById('apolloChart').getContext('2d');
        if(mainChart) mainChart.destroy();
        mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeline.map(t => formatDate(t.date)),
                datasets: [
                    { label: 'DISP', data: timeline.map(t => t.availableStock), borderColor: '#3b82f6', borderWidth: 4, stepped: true, z: 100, pointRadius: 0 },
                    { label: 'FIS', data: timeline.map(t => t.stock), borderColor: '#cbd5e1', borderWidth: 2.5, borderDash: [6, 4], pointRadius: 0, stepped: true, z: 90 },
                    { label: 'RUP', data: timeline.map(t => t.availableStock < 0 ? -10 : 0), fill: 'origin', backgroundColor: '#000', borderWidth: 0, pointRadius: 0, z: 10 },
                    { label: 'P50', data: timeline.map(t => t.p50), borderColor: '#ef4444', borderWidth: 1, pointRadius: 0, tension: 0.4 },
                    { label: 'P100', data: timeline.map(t => t.p100), borderColor: '#fbbf24', borderWidth: 1, pointRadius: 0, tension: 0.4 },
                    { label: 'P150', data: timeline.map(t => t.p150), borderColor: '#10b981', borderWidth: 1, pointRadius: 0, tension: 0.4 },
                    { label: 'P200', data: timeline.map(t => t.p200), borderColor: '#3b82f6', borderWidth: 1, pointRadius: 0, tension: 0.4 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#94a3b8', font: { size: 9, weight: '600' }, maxTicksLimit: 12 }, border: { color: '#fff', width: 1 } },
                    y: { min: -2, grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#94a3b8', font: { size: 9, weight: '600' } }, border: { color: '#fff', width: 1 } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = () => {
        const list = document.getElementById('list-stores');
        Object.keys(APOLLO_NETWORK_DATA).filter(k=>k!=='Fábrica').forEach(k=>{
            const d = document.createElement('div'); d.className='menu-item'; d.innerText=k; d.onclick=()=>switchStore(k); list.appendChild(d);
        });
        switchStore('Barreiro');
    };
</script>
</body>
</html>

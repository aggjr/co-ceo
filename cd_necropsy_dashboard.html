    <style>
        :root {

            --gold: #DAB177;

            --white: #F8FAFC;
            --ruby: #F43F5E;
            --emerald: #10B981;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1a3a6d 0%, var(--navy-bg) 100%);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        }

        h1 { color: var(--gold); letter-spacing: 2px; margin: 0; }
        .subtitle { opacity: 0.7; font-size: 0.9rem; }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 1100px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(218, 177, 119, 0.1);
        }

        .val { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
        .lab { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; }

        #error-msg {
            color: var(--ruby);
            background: rgba(244, 63, 94, 0.1);
            padding: 10px;
            border-radius: 5px;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
